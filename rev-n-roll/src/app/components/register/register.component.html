<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white tracking-tight">Rev<span class="text-purple-400">_n_</span>Roll</h1>
      <p class="text-slate-400 text-sm mt-1">Create your account</p>
    </div>

    <div class="bg-slate-800/60 backdrop-blur-sm border border-slate-700/50 rounded-2xl p-6 shadow-xl">
      <form (ngSubmit)="onRegister()">
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            class="w-full px-3 py-2.5 rounded-lg bg-slate-900/50 border border-slate-600/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition text-sm"
            required
          >
        </div>
        <div class="mb-4">
          <label for="nickname" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
          <input
            type="text"
            id="nickname"
            [(ngModel)]="nickname"
            name="nickname"
            placeholder="Choose a nickname"
            class="w-full px-3 py-2.5 rounded-lg bg-slate-900/50 border border-slate-600/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition text-sm"
            required
          >
        </div>
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Min. 1 special character"
            class="w-full px-3 py-2.5 rounded-lg bg-slate-900/50 border border-slate-600/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition text-sm"
            required
          >
        </div>
        <button
          type="submit"
          class="w-full py-2.5 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition shadow-lg shadow-indigo-500/20"
        >
          Create Account
        </button>
      </form>
      <div class="mt-4 text-center">
        <span class="text-slate-400 text-sm">Already have an account?</span>
        <a routerLink="/login" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium ml-1 transition">Sign in</a>
      </div>
    </div>
  </div>
</div>
