<div class="container">
  <div class="flex items-center justify-between mb-6">
    <h2 class="page-header mb-0"><mat-icon>groups</mat-icon> Crews</h2>
    <button mat-raised-button color="primary" (click)="onCreateCrew()">
      <mat-icon>add</mat-icon> Create Crew
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center py-12">
    <mat-spinner class="mx-auto" diameter="36"></mat-spinner>
  </div>

  <div *ngIf="errorMessage && !isLoading" class="text-center py-8 text-red-400 text-sm">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage" class="space-y-3">
    <div *ngIf="!crews || crews.length === 0" class="text-center py-16">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800/50 border border-slate-700/50 mb-4">
        <mat-icon class="text-slate-500" style="font-size: 32px; width: 32px; height: 32px;">groups</mat-icon>
      </div>
      <p class="text-slate-400 text-lg">No crews yet</p>
      <p class="text-slate-500 text-sm mt-1">Be the first to create one!</p>
    </div>

    <div
      *ngFor="let crew of crews"
      class="bg-slate-800/40 border border-slate-700/40 rounded-xl p-4 hover:border-indigo-500/30 transition cursor-pointer"
      (click)="viewCrewDetails(crew.id)"
    >
      <div class="flex items-start gap-4">
        <img
          [src]="crew.imageLocation || 'assets/default-crew.png'"
          alt="{{ crew.name }} logo"
          class="w-12 h-12 object-cover rounded-full border-2 border-purple-500/50 flex-shrink-0"
        >
        <div class="flex-1 min-w-0">
          <h4 class="text-white font-medium">{{ crew.name }}</h4>
          <p class="text-slate-400 text-sm mt-0.5">{{ crew.users.length }} member{{ crew.users.length !== 1 ? 's' : '' }}</p>
          <p class="text-slate-500 text-sm mt-1 line-clamp-2">{{ crew.description || 'No description provided.' }}</p>
        </div>

        <div class="flex gap-1 flex-shrink-0">
          <button mat-icon-button class="text-slate-400 hover:text-indigo-400"
                  [disabled]="!isMember(crew)"
                  [matTooltip]="isMember(crew) ? 'Edit Crew' : 'Members only'"
                  (click)="onEditCrew(crew); $event.stopPropagation()">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="text-slate-400 hover:text-red-400"
                  [disabled]="!isMember(crew)"
                  [matTooltip]="isMember(crew) ? 'Delete Crew' : 'Members only'"
                  (click)="onDeleteCrew(crew.id, $event)">
            <mat-icon>delete</mat-icon>
          </button>
          <button mat-icon-button class="text-slate-400 hover:text-blue-400"
                  matTooltip="View Crew Details"
                  (click)="viewCrewDetails(crew.id); $event.stopPropagation()">
            <mat-icon>visibility</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
