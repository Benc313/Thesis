<!-- 
  EventCard Component Template
  Displays event information in a Material Design card with accessibility features
-->

<mat-card 
  [class]="getElevationClass()"
  [class.compact]="compact"
  [class.event-card-meet]="eventType === 'meet'"
  [class.event-card-race]="eventType === 'race'"
  class="event-card"
  (click)="onCardClick()"
  role="article"
  [attr.aria-label]="'Event: ' + event.name"
  tabindex="0"
  (keydown.enter)="onCardClick()"
  (keydown.space)="onCardClick()">
  
  <!-- Card Header -->
  <mat-card-header>
    <div mat-card-avatar class="event-icon-container">
      <mat-icon [color]="getEventTypeColor()" aria-hidden="true">
        {{ getEventTypeIcon() }}
      </mat-icon>
    </div>
    
    <mat-card-title class="event-title">
      {{ event.name }}
      <mat-icon 
        *ngIf="event.private" 
        class="private-icon" 
        aria-label="Private event"
        matTooltip="Private Event">
        lock
      </mat-icon>
    </mat-card-title>
    
    <mat-card-subtitle class="event-date">
      <mat-icon class="subtitle-icon" aria-hidden="true">schedule</mat-icon>
      {{ getFormattedDate() }}
    </mat-card-subtitle>
  </mat-card-header>

  <!-- Card Content -->
  <mat-card-content>
    <!-- Location -->
    <div class="event-info-row">
      <mat-icon class="info-icon" aria-hidden="true">location_on</mat-icon>
      <span class="info-text">{{ event.location }}</span>
    </div>

    <!-- Creator (if available) -->
    <div class="event-info-row" *ngIf="event.creatorName">
      <mat-icon class="info-icon" aria-hidden="true">person</mat-icon>
      <span class="info-text">Organized by {{ event.creatorName }}</span>
    </div>

    <!-- Attendee Count (if available) -->
    <div class="event-info-row" *ngIf="event.attendeeCount !== undefined">
      <mat-icon class="info-icon" aria-hidden="true">group</mat-icon>
      <span class="info-text">{{ event.attendeeCount }} attendee{{ event.attendeeCount !== 1 ? 's' : '' }}</span>
    </div>

    <!-- Description -->
    <p class="event-description" [class.compact]="compact">
      {{ event.description }}
    </p>

    <!-- Tags -->
    <div class="event-tags" *ngIf="event.tags && event.tags.length > 0">
      <mat-chip-set aria-label="Event tags">
        <mat-chip *ngFor="let tag of event.tags" class="event-tag">
          {{ tag }}
        </mat-chip>
      </mat-chip-set>
    </div>
  </mat-card-content>

  <!-- Card Actions -->
  <mat-card-actions *ngIf="showActions" class="event-actions">
    <!-- View Details Button -->
    <button 
      mat-button 
      color="primary"
      (click)="onDetailsClick($event)"
      aria-label="View event details">
      <mat-icon>info</mat-icon>
      Details
    </button>

    <!-- Edit Button (only if user can edit) -->
    <button 
      *ngIf="canEdit"
      mat-button 
      color="accent"
      (click)="onEditClick($event)"
      aria-label="Edit event">
      <mat-icon>edit</mat-icon>
      Edit
    </button>

    <!-- Delete Button (only if user can delete) -->
    <button 
      *ngIf="canDelete"
      mat-button 
      color="warn"
      (click)="onDeleteClick($event)"
      aria-label="Delete event">
      <mat-icon>delete</mat-icon>
      Delete
    </button>

    <!-- Content Projection for Custom Actions -->
    <ng-content select="[actions]"></ng-content>
  </mat-card-actions>
</mat-card>
