# Docker Compose Configuration for Rev_n_Roll
# 
# This file defines the complete application stack including:
# - Backend API (.NET 9)
# - Frontend (Angular 19)
# - Database (PostgreSQL 16)
# - Cache (Redis 7)
# - Reverse Proxy (Nginx)
#
# Usage:
#   Development: docker-compose up
#   Production: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ============================================================================
  # DATABASE - PostgreSQL 16
  # ============================================================================
  database:
    image: postgres:16-alpine
    container_name: revnroll-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-revnroll}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - revnroll-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # CACHE - Redis 7
  # ============================================================================
  cache:
    image: redis:7-alpine
    container_name: revnroll-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - revnroll-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # BACKEND API - .NET 9
  # ============================================================================
  backend:
    build:
      context: ./ThesisBackend
      dockerfile: Dockerfile
    container_name: revnroll-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=database;Port=5432;Database=${DB_NAME:-revnroll};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - Redis__ConnectionString=cache:6379,password=${REDIS_PASSWORD:-redis123}
      - JWT__Secret=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT__Issuer=${JWT_ISSUER:-RevNRoll}
      - JWT__Audience=${JWT_AUDIENCE:-RevNRollUsers}
      - JWT__ExpirationMinutes=${JWT_EXPIRATION:-60}
      - Cors__AllowedOrigins=${CORS_ORIGINS:-http://localhost:4200,http://localhost:80}
    ports:
      - "${BACKEND_PORT:-5000}:80"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - revnroll-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # FRONTEND - Angular 19
  # ============================================================================
  frontend:
    build:
      context: ./rev-n-roll
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL:-http://localhost:5000}
    container_name: revnroll-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - backend
    networks:
      - revnroll-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # REVERSE PROXY - Nginx (Optional, for production)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: revnroll-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - revnroll-network
    profiles:
      - production

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  revnroll-network:
    driver: bridge
    name: revnroll-network

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    name: revnroll-postgres-data
  redis_data:
    name: revnroll-redis-data
  nginx_logs:
    name: revnroll-nginx-logs
